services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: jasabersih-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jasabersih
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: jasabersih_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jasabersih-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: jasabersih-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: jasabersih
      MINIO_ROOT_PASSWORD: dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:

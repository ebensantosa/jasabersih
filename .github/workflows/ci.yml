name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: jasabersih
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: jasabersih_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://jasabersih:dev_password@localhost:5432/jasabersih_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test-access-secret-please-change
      JWT_REFRESH_SECRET: test-refresh-secret-please-change
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run db:generate -w @jasabersih/api
      - run: npm run db:migrate:deploy -w @jasabersih/api
      - run: npx turbo run lint typecheck test
      - run: npx turbo run build

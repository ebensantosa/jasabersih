name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: # bisa juga trigger manual dari GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH ke VPS dan deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/jasabersih
            bash deploy/deploy.sh

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Result
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deploy ke VPS berhasil"
          else
            echo "❌ Deploy gagal — cek logs"
          fi

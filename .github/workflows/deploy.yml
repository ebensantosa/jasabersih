name: Deploy to VPS

on:
  push:
    branches: [main]
  # Manual trigger from the Actions tab — useful for redeploying without
  # making a no-op commit.
  workflow_dispatch:

# Prevent two deploys racing each other. The second push waits for the first.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # We don't build on the runner — we ssh into the VPS and let it pull
      # + build. Keeps deploy logs in one place (the VPS) and avoids
      # shipping a build bundle through the wire on every push.

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Run deploy.sh on VPS
        run: |
          ssh -o StrictHostKeyChecking=yes \
              deploy@${{ secrets.VPS_HOST }} \
              "CI=true bash /var/www/jasabersih/deploy/deploy.sh"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed — check pm2 logs on the VPS:"
          echo "  ssh deploy@\$VPS_HOST 'pm2 logs jasabersih-api --lines 50'"
          echo "  ssh deploy@\$VPS_HOST 'pm2 logs jasabersih-admin --lines 50'"
